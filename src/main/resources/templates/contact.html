<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我 - 星辰博客</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="starfield"></canvas>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <i class="fa-solid fa-star"></i>
                <span>星辰博客</span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="/" class="nav-link">首页</a>
                <a href="/blog" class="nav-link">文章</a>
                <a href="/about" class="nav-link">关于我</a>
                <a href="/contact" class="nav-link active">联系我</a>
            </div>
            <button class="menu-toggle" id="menuToggle">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </nav>

    <section class="page-hero">
        <div class="container">
            <h1 class="page-hero-title">联系<span class="gradient-text">我</span></h1>
            <p class="page-hero-desc">有问题？有建议？欢迎随时与我交流</p>
        </div>
    </section>

    <section class="section contact-section">
        <div class="container">
            <div class="contact-grid">
                <!-- 联系表单 -->
                <div class="contact-form-card glass-card">
                    <h2 class="contact-form-title">发送<span class="gradient-text">消息</span></h2>
                    <form class="contact-form" id="contactForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="name">姓名</label>
                                <input type="text" id="name" placeholder="请输入您的姓名" required>
                            </div>
                            <div class="form-group">
                                <label for="email">邮箱</label>
                                <input type="email" id="email" placeholder="请输入您的邮箱" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="subject">主题</label>
                            <input type="text" id="subject" placeholder="消息主题" required>
                        </div>
                        <div class="form-group">
                            <label for="message">消息内容</label>
                            <textarea id="message" rows="6" placeholder="请输入您想说的话..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-glow btn-block">
                            <i class="fa-solid fa-paper-plane"></i> 发送消息
                        </button>
                    </form>
                </div>

                <!-- 联系信息 -->
                <div class="contact-info-side">
                    <div class="contact-info-card glass-card">
                        <div class="contact-info-icon">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                        <h3>邮箱</h3>
                        <p>3322729054@qq.com</p>
                        <p>support@starryblog.com</p>
                    </div>
                    <div class="contact-info-card glass-card">
                        <div class="contact-info-icon">
                            <i class="fa-solid fa-location-dot"></i>
                        </div>
                        <h3>地址</h3>
                        <p>中国 · 浙江</p>
                        <p>杭州</p>
                    </div>
                    <div class="contact-info-card glass-card">
                        <div class="contact-info-icon">
                            <i class="fa-solid fa-share-nodes"></i>
                        </div>
                        <h3>社交媒体</h3>
                        <div class="contact-socials">
                            <a href="https://github.com/" class="contact-social-btn"><i class="fa-brands fa-github"></i></a>
                            <a href="#" class="contact-social-btn"><i class="fa-brands fa-twitter"></i></a>
                            <a href="#" class="contact-social-btn"><i class="fa-brands fa-weixin"></i></a>
                            <a href="#" class="contact-social-btn"><i class="fa-brands fa-bilibili"></i></a>
                            <a href="#" class="contact-social-btn"><i class="fa-brands fa-zhihu"></i></a>
                            <a href="#" class="contact-social-btn"><i class="fa-solid fa-envelope"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <h3><i class="fa-solid fa-star"></i> 星辰博客</h3>
                    <p>用代码书写世界，用技术改变未来。</p>
                </div>
                <div class="footer-links">
                    <h4>快速导航</h4>
                    <a href="/">首页</a>
                    <a href="/blog">文章列表</a>
                    <a href="/about">关于我</a>
                    <a href="/contact">联系我</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; <span th:text="${currentYear}"></span> 星辰博客. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <button class="back-to-top" id="backToTop">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <script src="/js/main.js"></script>
</body>
</html>
